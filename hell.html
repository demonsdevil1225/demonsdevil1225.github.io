<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Us — Names We Call Each Other 💙</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --deep:#00050f;
  --moonlight:#a8d4ff;
  --rose:#f4a0b0;
  --gold:#ffd97d;
  --soft:#e8f4ff;
  --violet:#c084fc;
  --teal:#5dcaa5;
  --orange:#fb923c;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:radial-gradient(ellipse at 50% 0%,#001535 0%,#000a1e 40%,#00050f 100%);
  font-family:'Cormorant Garamond',serif;
  color:var(--soft);
  overflow-x:hidden;
  min-height:100vh;
}
#starCanvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;}
.mist{position:fixed;bottom:0;left:0;right:0;height:40vh;pointer-events:none;z-index:2;
  background:linear-gradient(to top,rgba(0,30,80,0.4) 0%,rgba(0,60,120,0.08) 50%,transparent 100%);
  animation:mistDrift 9s ease-in-out infinite alternate;}
@keyframes mistDrift{0%{opacity:.7;transform:translateY(0)}100%{opacity:1;transform:translateY(-12px)}}
.aurora{position:fixed;top:0;left:0;right:0;height:60vh;pointer-events:none;z-index:2;overflow:hidden;opacity:0.15;}
.aurora-band{position:absolute;left:-20%;right:-20%;height:200px;border-radius:50%;filter:blur(60px);animation:auroraDrift 12s ease-in-out infinite alternate;}
.aurora-band:nth-child(1){top:5%;background:rgba(50,120,255,0.6);animation-delay:0s;}
.aurora-band:nth-child(2){top:10%;background:rgba(192,132,252,0.45);animation-delay:-4s;}
.aurora-band:nth-child(3){top:2%;background:rgba(244,160,176,0.3);animation-delay:-8s;}
@keyframes auroraDrift{0%{transform:translateX(-8%) scaleY(1)}50%{transform:translateX(5%) scaleY(1.3)}100%{transform:translateX(-3%) scaleY(0.8)}}
.moonray{position:fixed;top:0;width:1px;height:75vh;pointer-events:none;z-index:2;transform-origin:top center;
  background:linear-gradient(to bottom,rgba(100,180,255,0.5),transparent);animation:rayWaver 7s ease-in-out infinite alternate;}
@keyframes rayWaver{0%{opacity:.05;transform:scaleX(1) rotate(var(--a))}100%{opacity:.12;transform:scaleX(3) rotate(var(--a))}}

/* MUSIC */
#musicBtn{position:fixed;bottom:2rem;right:2rem;z-index:99990;width:56px;height:56px;border-radius:50%;
  border:1.5px solid rgba(100,180,255,0.35);background:rgba(0,20,60,0.65);
  backdrop-filter:blur(16px);cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;box-shadow:0 0 24px rgba(50,150,255,0.25),0 4px 20px rgba(0,0,0,0.4);
  transition:transform .25s,box-shadow .25s;animation:musicBtnPulse 3s ease-in-out infinite;border:none;}
#musicBtn:hover{transform:scale(1.12);}
@keyframes musicBtnPulse{0%,100%{box-shadow:0 0 18px rgba(50,150,255,0.3),0 4px 20px rgba(0,0,0,0.4)}50%{box-shadow:0 0 40px rgba(100,180,255,0.65),0 4px 20px rgba(0,0,0,0.4)}}
#musicBtn::before{content:'';position:absolute;inset:-6px;border-radius:50%;border:1px solid rgba(100,180,255,0.18);animation:vinylSpin 4s linear infinite;}
#musicBtn.muted::before{opacity:0;}
@keyframes vinylSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.music-note{position:fixed;pointer-events:none;z-index:99989;font-size:1rem;animation:noteFloat 3s ease-out forwards;}
@keyframes noteFloat{0%{opacity:1;transform:translate(0,0)}100%{opacity:0;transform:translate(var(--nx),var(--ny)) scale(0.4)}}

/* BACK */
.back-btn{position:fixed;top:1.5rem;left:1.5rem;z-index:9999;
  background:rgba(0,20,60,0.6);border:1px solid rgba(100,180,255,0.25);
  backdrop-filter:blur(16px);color:var(--moonlight);font-family:'Dancing Script',cursive;font-size:1rem;
  padding:.55rem 1.2rem;border-radius:50px;cursor:pointer;text-decoration:none;
  display:flex;align-items:center;gap:.4rem;transition:all .25s;}
.back-btn:hover{background:rgba(0,40,100,0.8);transform:translateX(-3px);}

/* HERO — full screen like travel page */
.hero{position:relative;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.hero-video-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;}
.hero-overlay{position:absolute;inset:0;z-index:1;
  background:linear-gradient(to bottom,rgba(0,5,20,.55) 0%,rgba(0,10,30,.25) 40%,rgba(0,10,30,.35) 70%,rgba(0,5,20,.75) 100%);}
.hero-content{position:relative;z-index:2;text-align:center;padding:2rem;max-width:820px;width:100%;}
.hero-eyebrow{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(.78rem,1.8vw,.95rem);
  letter-spacing:.3em;color:rgba(244,160,176,0.5);text-transform:uppercase;margin-bottom:1.2rem;}
.hero-sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(1rem,2.2vw,1.3rem);
  color:rgba(200,230,255,0.7);letter-spacing:.06em;}

/* glass badge at bottom — like travel hero */
.hero-glass-badge{
  position:absolute;bottom:2.2rem;left:50%;transform:translateX(-50%);z-index:2;
  background:rgba(0,20,60,0.45);border:1px solid rgba(100,180,255,0.22);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-radius:50px;padding:.75rem 2rem;
  display:flex;align-items:center;gap:1rem;
  box-shadow:0 4px 30px rgba(0,60,200,0.25),inset 0 1px 0 rgba(150,200,255,0.12);
  white-space:nowrap;animation:badgeSlideUp 1s ease-out 1.2s both;}
@keyframes badgeSlideUp{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.hero-glass-badge::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;border-radius:50px;
  background:linear-gradient(90deg,transparent,rgba(150,200,255,.35),transparent);}
.hgb-name{font-family:'Dancing Script',cursive;font-size:1.25rem;color:var(--moonlight);text-shadow:0 0 12px rgba(100,180,255,.6);}
.hgb-icons{font-size:1.1rem;letter-spacing:.25rem;}

/* SCROLL CUE */
.scroll-cue{position:absolute;bottom:5.5rem;left:50%;transform:translateX(-50%);z-index:2;
  display:flex;flex-direction:column;align-items:center;gap:.4rem;
  animation:cuePulse 2.5s ease-in-out infinite;color:rgba(200,180,255,.5);
  font-size:.72rem;letter-spacing:.18em;font-family:'Cormorant Garamond',serif;font-style:italic;}
.scroll-cue::after{content:'';display:block;width:1px;height:32px;background:linear-gradient(to bottom,rgba(200,160,255,.5),transparent);}
@keyframes cuePulse{0%,100%{opacity:.4;transform:translateX(-50%) translateY(0)}50%{opacity:1;transform:translateX(-50%) translateY(6px)}}

/* SECTION */
.section{padding:5rem 2rem;position:relative;z-index:10;}
.container{max-width:1100px;margin:0 auto;}
.sec-eyebrow{text-align:center;font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:.8rem;letter-spacing:.3em;color:rgba(150,200,255,0.35);text-transform:uppercase;margin-bottom:.5rem;}
.sec-title{font-family:'Dancing Script',cursive;font-size:clamp(2.2rem,5vw,3.2rem);color:var(--moonlight);
  text-align:center;margin-bottom:.5rem;text-shadow:0 0 40px rgba(50,150,255,.4);}
.sec-divider{width:80px;height:1px;margin:0 auto 3.5rem;background:linear-gradient(90deg,transparent,rgba(100,180,255,.5),transparent);}

/* NAME PAIR CARDS */
.pairs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:1.5rem;}

.pair-card{
  position:relative;border-radius:20px;overflow:hidden;
  background:rgba(0,15,45,0.4);
  border:1px solid rgba(255,255,255,0.07);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  box-shadow:0 8px 40px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,0.05);
  transition:transform .35s cubic-bezier(.34,1.56,.64,1),box-shadow .35s;
  opacity:0;transform:translateY(28px);transition:opacity .8s,transform .8s,box-shadow .35s;}
.pair-card.visible{opacity:1;transform:translateY(0);}
.pair-card:hover{transform:translateY(-6px) scale(1.015);box-shadow:0 20px 60px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,0.1);}
.pair-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.12),transparent);}

/* accent strip left */
.pair-card::after{content:'';position:absolute;left:0;top:20%;bottom:20%;width:2px;border-radius:2px;
  background:var(--accent-color,rgba(100,180,255,0.4));}

.pair-inner{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:.5rem;padding:1.6rem 1.8rem;}

.name-slot{display:flex;flex-direction:column;gap:.25rem;}
.name-slot.her{text-align:left;}
.name-slot.him{text-align:right;}

.name-label{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.72rem;
  letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,0.28);}
.name-label.her-lbl{color:var(--her-color,rgba(244,160,176,0.55));}
.name-label.him-lbl{color:var(--his-color,rgba(168,212,255,0.55));}

.name-text{font-family:'Dancing Script',cursive;font-weight:700;
  font-size:clamp(1.1rem,2.5vw,1.55rem);line-height:1.1;}
.name-text.her-name{color:var(--her-color,#f4a0b0);text-shadow:0 0 20px var(--her-color,rgba(244,160,176,.3));}
.name-text.him-name{color:var(--his-color,#a8d4ff);text-shadow:0 0 20px var(--his-color,rgba(168,212,255,.3));}
.name-text.none-name{color:rgba(255,255,255,0.2);font-style:italic;font-size:clamp(.9rem,2vw,1.1rem);}

/* center connector */
.pair-connector{display:flex;flex-direction:column;align-items:center;gap:.3rem;flex-shrink:0;}
.connector-icon{font-size:1.6rem;filter:drop-shadow(0 0 8px rgba(255,255,255,0.3));
  animation:iconPulse 3s ease-in-out infinite;}
@keyframes iconPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.connector-line{width:1px;height:20px;background:linear-gradient(to bottom,transparent,rgba(255,255,255,0.15),transparent);}

/* theme strips */
.pair-card.theme-rose{--accent-color:rgba(244,160,176,0.5);--her-color:#f4a0b0;--his-color:#a8d4ff;}
.pair-card.theme-gold{--accent-color:rgba(255,217,125,0.5);--her-color:#ffd97d;--his-color:#a8d4ff;}
.pair-card.theme-violet{--accent-color:rgba(192,132,252,0.5);--her-color:#c084fc;--his-color:#818cf8;}
.pair-card.theme-teal{--accent-color:rgba(93,202,165,0.5);--her-color:#5dcaa5;--his-color:#38bdf8;}
.pair-card.theme-orange{--accent-color:rgba(251,146,60,0.5);--her-color:#fb923c;--his-color:#60a5fa;}
.pair-card.theme-red{--accent-color:rgba(255,77,109,0.5);--her-color:#ff4d6d;--his-color:#a8d4ff;}

/* glow blob background per card */
.pair-blob{position:absolute;inset:0;pointer-events:none;z-index:0;border-radius:20px;overflow:hidden;}
.pair-blob::before{content:'';position:absolute;width:200px;height:200px;border-radius:50%;
  background:radial-gradient(circle,var(--blob-color,rgba(100,180,255,0.06)),transparent 70%);
  top:-40px;left:-40px;filter:blur(30px);}
.pair-card.theme-rose .pair-blob::before{--blob-color:rgba(244,160,176,0.08);}
.pair-card.theme-gold .pair-blob::before{--blob-color:rgba(255,217,125,0.07);}
.pair-card.theme-violet .pair-blob::before{--blob-color:rgba(192,132,252,0.07);}
.pair-card.theme-teal .pair-blob::before{--blob-color:rgba(93,202,165,0.07);}
.pair-card.theme-orange .pair-blob::before{--blob-color:rgba(251,146,60,0.07);}
.pair-card.theme-red .pair-blob::before{--blob-color:rgba(255,77,109,0.08);}

.pair-inner{position:relative;z-index:1;}

/* FLIP CARD EFFECT for special pairs */
.pair-card.special{cursor:pointer;}
.pair-card.special:hover .connector-icon{animation:iconSpin .5s ease forwards;}
@keyframes iconSpin{0%{transform:scale(1) rotate(0deg)}50%{transform:scale(1.3) rotate(180deg)}100%{transform:scale(1) rotate(360deg)}}

/* CYCLING NAME DISPLAY (hero) */
.name-cycle-wrap{height:clamp(2.5rem,6vw,4rem);overflow:hidden;position:relative;margin-bottom:1rem;}
.name-cycle-item{position:absolute;left:0;right:0;text-align:center;
  font-family:'Dancing Script',cursive;font-weight:700;
  font-size:clamp(2rem,6.5vw,4.5rem);line-height:1.1;
  background:linear-gradient(135deg,#fff 0%,#a8d4ff 35%,#f4a0b0 70%,#ffd97d 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  transform:translateY(110%);transition:transform .5s cubic-bezier(.4,0,.2,1);}
.name-cycle-item.active{transform:translateY(0);}
.name-cycle-item.exit{transform:translateY(-110%);}

/* FLOAT HEART */
.float-heart{position:fixed;pointer-events:none;z-index:9999;animation:floatUp 4s ease-in forwards;}
@keyframes floatUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-80vh) scale(.5)}}
.sparkle{position:fixed;pointer-events:none;z-index:9999;width:5px;height:5px;border-radius:50%;
  background:radial-gradient(circle,#fff 0%,rgba(244,160,176,.5) 60%,transparent 100%);
  animation:sparkleOut .8s ease-out forwards;}
@keyframes sparkleOut{0%{opacity:1;transform:scale(1) translate(0,0)}100%{opacity:0;transform:scale(0) translate(var(--sx),var(--sy))}}

/* SEP */
.sep{height:1px;max-width:800px;margin:2rem auto;background:linear-gradient(90deg,transparent,rgba(100,180,255,0.1),transparent);position:relative;z-index:10;}
.sep::before{content:'✦';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  background:#000a1e;padding:0 1rem;font-size:.75rem;color:rgba(100,180,255,0.2);}

/* TOTAL COUNT */
.count-banner{display:flex;justify-content:center;gap:3rem;flex-wrap:wrap;margin-bottom:3.5rem;}
.cban{text-align:center;}
.cban-num{font-family:'Playfair Display',serif;font-size:clamp(2.5rem,6vw,4rem);font-weight:700;display:block;line-height:1;
  background:linear-gradient(135deg,#a8d4ff,#f4a0b0,#ffd97d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 15px rgba(168,212,255,.3));}
.cban-lbl{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.9rem;color:rgba(150,200,255,.4);letter-spacing:.08em;}

footer{text-align:center;padding:3rem 2rem;font-family:'Dancing Script',cursive;font-size:1.1rem;color:rgba(100,180,255,.3);z-index:10;position:relative;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:rgba(100,180,255,.2);border-radius:2px;}
.reveal{opacity:0;transform:translateY(24px);transition:opacity .9s,transform .9s;}
.reveal.visible{opacity:1;transform:translateY(0);}
@media(max-width:600px){.pairs-grid{grid-template-columns:1fr;}.count-banner{gap:1.5rem;}}
</style>
</head>
<body>

<div class="mist"></div>
<div class="aurora"><div class="aurora-band"></div><div class="aurora-band"></div><div class="aurora-band"></div></div>
<div class="moonray" style="--a:-18deg;left:25%;"></div>
<div class="moonray" style="--a:0deg;left:50%;"></div>
<div class="moonray" style="--a:18deg;left:75%;"></div>
<canvas id="starCanvas"></canvas>

<audio id="bgMusic" loop><source src="hell.mp3" type="audio/mpeg"></audio>
<button id="musicBtn" title="Toggle music" onclick="toggleMusic()">🎵</button>
<a href="index.html" class="back-btn">← Home</a>

<!-- HERO -->
<section class="hero">
  <video class="hero-video-bg" autoplay loop muted playsinline>
    <source src="dragon.mp4" type="video/mp4">
  </video>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <p class="hero-eyebrow">the names only we know</p>
    <!-- cycling name display -->
    <div class="name-cycle-wrap" id="nameCycleWrap"></div>
    <p class="hero-sub">Every name a feeling, every nickname a universe 🌙</p>
  </div>
  <div class="hero-glass-badge">
    <span class="hgb-name">Ammukutty &amp; Bubbly Kutty 💙</span>
    <span class="hgb-icons">🌙 ⭐ 💙</span>
  </div>
  <div class="scroll-cue">discover</div>
</section>

<!-- PAIRS SECTION -->
<section class="section reveal" id="pairsSection">
  <div class="container">
    <p class="sec-eyebrow">what we call each other</p>
    <h2 class="sec-title">Our Names 💙</h2>
    <div class="sec-divider"></div>

    <!-- count -->
    <div class="count-banner reveal">
      <div class="cban"><span class="cban-num">14</span><span class="cban-lbl">name pairs</span></div>
      <div class="cban"><span class="cban-num">28</span><span class="cban-lbl">nicknames total</span></div>
      <div class="cban"><span class="cban-num">∞</span><span class="cban-lbl">feelings behind them</span></div>
    </div>

    <div class="pairs-grid" id="pairsGrid"></div>
  </div>
</section>

<div class="sep"></div>
<footer>Whatever name you call me by — my answer is always you 🌙 💙</footer>

<script>
/* ══ DATA ══ */
const PAIRS = [
  { her:'Ammukutty',   him:'Bubbly Kutty', icon:'🌸', theme:'rose',   herDesc:'her forever name',   himDesc:'her name for him'    },
  { her:'Ammu',        him:'Bubbly',        icon:'💙', theme:'rose',   herDesc:'soft & sweet',        himDesc:'always bubbly'       },
  { her:'Kutty',       him:'Pa',            icon:'🤍', theme:'violet', herDesc:'little one',          himDesc:'her person'          },
  { her:'Moon',        him:'Sun',           icon:'🌙', theme:'gold',   herDesc:'his moon',            himDesc:'her sun'             },
  { her:'Devil',       him:'Demon',         icon:'😈', theme:'red',    herDesc:'her wild side',       himDesc:'his chaos'           },
  { her:'Partner',     him:'Partner',       icon:'🤝', theme:'teal',   herDesc:'always',              himDesc:'always'              },
  { her:'Darling',     him:'Darling',       icon:'💝', theme:'rose',   herDesc:'forever',             himDesc:'forever'             },
  { her:'Wednesday Adams', him:'None',      icon:'🖤', theme:'violet', herDesc:'the dark queen',      himDesc:'—'                   },
  { her:'Light Fury',  him:'Night Fury',    icon:'🐉', theme:'teal',   herDesc:'pure & white',        himDesc:'dark & fierce'       },
  { her:'Harley Quinn',him:'Joker',         icon:'🃏', theme:'red',    herDesc:'the queen of chaos',  himDesc:'her chaos king'      },
  { her:'Fire',        him:'Water',         icon:'⚡', theme:'orange', herDesc:'burns bright',        himDesc:'keeps her steady'    },
  { her:'Kadhali',     him:'Kadhalan',      icon:'💖', theme:'rose',   herDesc:'his beloved',         himDesc:'her beloved'         },
  { her:'Señorita',    him:'Señor',         icon:'🌹', theme:'gold',   herDesc:'senorita',            himDesc:'her señor'           },
  { her:'Akuma',       him:'Baka',          icon:'⚔️', theme:'violet', herDesc:'demon queen',         himDesc:'her fool'            },
  { her:'Mommy',       him:'Daddy',         icon:'🏠', theme:'teal',   herDesc:'the softness',        himDesc:'the strength'        },
  { her:'alagi',       him:'alagan',        icon:'💋', theme:'orange', herDesc:'avan kavithai',       himDesc:'tamil kavi'          },
  { her:'priyathama',  him:'bava',        icon:'💜', theme:'gold',     herDesc:'our mother toung',    himDesc:'our mother toung'          },
];

/* ══ BUILD PAIRS ══ */
(function buildPairs(){
  const grid = document.getElementById('pairsGrid');
  PAIRS.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = `pair-card theme-${p.theme}`;
    card.style.transitionDelay = (i * 0.06) + 's';

    const noneClass = p.him === 'None' || p.him === '—' ? 'none-name' : 'him-name';
    const herHtml  = `<div class="name-slot her">
      <span class="name-label her-lbl">her</span>
      <span class="name-text her-name">${p.her}</span>
      <span style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.75rem;color:rgba(255,255,255,0.22);">${p.herDesc}</span>
    </div>`;
    const himHtml  = `<div class="name-slot him">
      <span class="name-label him-lbl">him</span>
      <span class="name-text ${noneClass}">${p.him === 'None' ? '—' : p.him}</span>
      <span style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.75rem;color:rgba(255,255,255,0.22);">${p.himDesc}</span>
    </div>`;
    const connHtml = `<div class="pair-connector">
      <div class="connector-line"></div>
      <span class="connector-icon">${p.icon}</span>
      <div class="connector-line"></div>
    </div>`;

    card.innerHTML = `<div class="pair-blob"></div><div class="pair-inner">${herHtml}${connHtml}${himHtml}</div>`;
    card.addEventListener('click', () => spawnHearts(card));
    grid.appendChild(card);
  });
})();

/* ══ NAME CYCLE (hero) ══ */
(function initCycle(){
  const wrap = document.getElementById('nameCycleWrap');
  const all = [...new Set(PAIRS.flatMap(p => [p.her, p.him]).filter(n => n !== 'None' && n !== '—'))];
  all.forEach((n,i) => {
    const el = document.createElement('div');
    el.className = 'name-cycle-item' + (i===0?' active':'');
    el.textContent = n;
    wrap.appendChild(el);
  });
  const items = wrap.querySelectorAll('.name-cycle-item');
  let cur = 0;
  setInterval(() => {
    items[cur].classList.remove('active'); items[cur].classList.add('exit');
    setTimeout(() => items[cur].classList.remove('exit'), 500);
    cur = (cur+1) % items.length;
    items[cur].classList.add('active');
  }, 1800);
})();

/* ══ SCROLL REVEAL ══ */
const obs = new IntersectionObserver(entries => {
  entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.06 });
document.querySelectorAll('.reveal, .pair-card').forEach(el => obs.observe(el));

/* ══ STARS ══ */
(function(){
  const c=document.getElementById('starCanvas'),ctx=c.getContext('2d');
  let W,H,stars=[],shooters=[];
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  for(let i=0;i<220;i++) stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.8+.2,a:Math.random(),da:Math.random()*.007+.002,col:Math.random()<.5?'180,220,255':'255,255,255'});
  setInterval(()=>{if(Math.random()<.4) shooters.push({x:Math.random()*W,y:0,vx:-(Math.random()*6+3),vy:Math.random()*4+3,len:Math.random()*150+80,a:1,col:Math.random()<.4?'100,180,255':'255,200,220'});},600);
  (function draw(){
    ctx.clearRect(0,0,W,H);
    stars.forEach(s=>{s.a+=s.da;if(s.a>1||s.a<0)s.da*=-1;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(${s.col},${s.a*.85})`;ctx.fill();});
    shooters.forEach((s,i)=>{s.x+=s.vx;s.y+=s.vy;s.a-=.009;if(s.a<=0||s.y>H){shooters.splice(i,1);return;}
      ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x-s.vx*(s.len/8),s.y-s.vy*(s.len/8));
      const g=ctx.createLinearGradient(s.x,s.y,s.x-s.vx*(s.len/8),s.y-s.vy*(s.len/8));
      g.addColorStop(0,`rgba(${s.col},${s.a})`);g.addColorStop(1,'transparent');
      ctx.strokeStyle=g;ctx.lineWidth=2;ctx.stroke();
      ctx.beginPath();ctx.arc(s.x,s.y,2.5,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${s.a})`;ctx.fill();});
    requestAnimationFrame(draw);
  })();
})();

/* ══ MUSIC ══ */
const bgMusic=document.getElementById('bgMusic'),musicBtn=document.getElementById('musicBtn');
let musicPlaying=false,musicStarted=false,noteInterval=null;
function startMusic(){
  bgMusic.volume=.45;
  bgMusic.play().then(()=>{musicPlaying=true;musicStarted=true;musicBtn.textContent='🎵';musicBtn.classList.remove('muted');startNotes();document.removeEventListener('click',tryAuto);document.removeEventListener('touchstart',tryAuto);}).catch(()=>{musicBtn.textContent='🔇';musicBtn.classList.add('muted');});
}
function toggleMusic(){
  if(!musicStarted){startMusic();return;}
  if(musicPlaying){bgMusic.pause();musicPlaying=false;musicBtn.textContent='🔇';musicBtn.classList.add('muted');if(noteInterval){clearInterval(noteInterval);noteInterval=null;}}
  else{bgMusic.play();musicPlaying=true;musicBtn.textContent='🎵';musicBtn.classList.remove('muted');startNotes();}
}
function startNotes(){
  if(noteInterval)clearInterval(noteInterval);
  noteInterval=setInterval(()=>{
    if(!musicPlaying)return;
    const note=document.createElement('div');note.className='music-note';
    note.textContent=['♪','♫','♬','🎵','🎶'][Math.floor(Math.random()*5)];
    const rect=musicBtn.getBoundingClientRect();
    note.style.cssText=`left:${rect.left+rect.width/2}px;top:${rect.top+rect.height/2}px;position:fixed;color:rgba(244,160,176,0.9);pointer-events:none;`;
    const nx=(Math.random()*100-80)+'px',ny=-(Math.random()*80+40)+'px';
    note.style.setProperty('--nx',nx);note.style.setProperty('--ny',ny);
    document.body.appendChild(note);setTimeout(()=>note.remove(),3000);
  },800);
}
function tryAuto(){if(!musicStarted)startMusic();}
document.addEventListener('click',tryAuto);document.addEventListener('touchstart',tryAuto);

/* ══ HEARTS ══ */
function spawnHearts(el){
  const rect=el.getBoundingClientRect();
  const emojis=['💙','✨','🌙','💖','🌸','💝','⭐','🎉'];
  for(let i=0;i<10;i++){
    const h=document.createElement('div');h.className='float-heart';
    h.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    h.style.cssText=`left:${rect.left+Math.random()*rect.width}px;top:${rect.top+window.scrollY+rect.height/2}px;position:absolute;font-size:${Math.random()*1+.8}rem;pointer-events:none;`;
    document.body.appendChild(h);setTimeout(()=>h.remove(),4000);
  }
}
document.addEventListener('click',e=>{
  if(e.target.closest('.back-btn')||e.target.closest('#musicBtn')||e.target.closest('.pair-card'))return;
  for(let i=0;i<4;i++){
    const h=document.createElement('div');h.className='float-heart';
    h.textContent=['💙','✨','🌙','💖','⭐'][Math.floor(Math.random()*5)];
    h.style.cssText=`left:${e.clientX+Math.random()*30-15}px;top:${e.clientY+window.scrollY}px;position:absolute;font-size:${Math.random()*.7+.6}rem;pointer-events:none;`;
    document.body.appendChild(h);setTimeout(()=>h.remove(),4000);
  }
  for(let i=0;i<6;i++){
    const sp=document.createElement('div');sp.className='sparkle';
    const angle=Math.random()*Math.PI*2,dist=Math.random()*55+15;
    sp.style.cssText=`left:${e.clientX}px;top:${e.clientY+window.scrollY}px;position:absolute;`;
    sp.style.setProperty('--sx',Math.cos(angle)*dist+'px');sp.style.setProperty('--sy',Math.sin(angle)*dist+'px');
    document.body.appendChild(sp);setTimeout(()=>sp.remove(),900);
  }
});
</script>
