<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kavithaigal 💙</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep: #00050f;
            --moonlight: #a8d4ff;
            --blue-glow: #4a9eff;
            --blue-soft: #7ec8ff;
            --rose: #f4a0b0;
            --gold: #ffd97d;
            --soft: #e8f4ff;
            --heart: #ff4d6d;
            --violet: #c084fc;
            --teal: #5dcaa5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: radial-gradient(ellipse at 50% 0%, #001535 0%, #000a1e 40%, #00050f 100%);
            font-family: 'Cormorant Garamond', serif;
            color: var(--soft);
            overflow-x: hidden;
            min-height: 100vh;
        }

        #starCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .mist {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40vh;
            pointer-events: none;
            z-index: 2;
            background: linear-gradient(to top, rgba(0, 30, 80, 0.4) 0%, rgba(0, 60, 120, 0.08) 50%, transparent 100%);
            animation: mistDrift 9s ease-in-out infinite alternate;
        }

        @keyframes mistDrift {
            0% {
                opacity: .7;
                transform: translateY(0)
            }
            100% {
                opacity: 1;
                transform: translateY(-12px)
            }
        }

        .aurora {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60vh;
            pointer-events: none;
            z-index: 2;
            overflow: hidden;
            opacity: 0.14;
        }

        .aurora-band {
            position: absolute;
            left: -20%;
            right: -20%;
            height: 200px;
            border-radius: 50%;
            filter: blur(60px);
            animation: auroraDrift 12s ease-in-out infinite alternate;
        }

        .aurora-band:nth-child(1) {
            top: 5%;
            background: rgba(50, 120, 255, 0.6);
            animation-delay: 0s;
        }

        .aurora-band:nth-child(2) {
            top: 10%;
            background: rgba(150, 60, 255, 0.5);
            animation-delay: -4s;
        }

        .aurora-band:nth-child(3) {
            top: 2%;
            background: rgba(244, 160, 176, 0.25);
            animation-delay: -8s;
        }

        @keyframes auroraDrift {
            0% {
                transform: translateX(-8%) scaleY(1)
            }
            50% {
                transform: translateX(5%) scaleY(1.3)
            }
            100% {
                transform: translateX(-3%) scaleY(0.8)
            }
        }

        .moonray {
            position: fixed;
            top: 0;
            width: 1px;
            height: 75vh;
            pointer-events: none;
            z-index: 2;
            transform-origin: top center;
            background: linear-gradient(to bottom, rgba(100, 180, 255, 0.5), transparent);
            animation: rayWaver 7s ease-in-out infinite alternate;
        }

        @keyframes rayWaver {
            0% {
                opacity: .05;
                transform: scaleX(1) rotate(var(--a))
            }
            100% {
                opacity: .12;
                transform: scaleX(3) rotate(var(--a))
            }
        }

        /* ── MUSIC ── */
        #musicBtn {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 99990;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 1.5px solid rgba(100, 180, 255, 0.35);
            background: rgba(0, 20, 60, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 0 24px rgba(50, 150, 255, 0.25), 0 4px 20px rgba(0, 0, 0, 0.4);
            transition: transform .25s, box-shadow .25s;
            animation: musicBtnPulse 3s ease-in-out infinite;
            border: none;
        }

        #musicBtn:hover {
            transform: scale(1.12);
            box-shadow: 0 0 40px rgba(50, 150, 255, 0.5);
        }

        #musicBtn.muted {
            animation: none;
            box-shadow: 0 0 16px rgba(244, 160, 176, 0.15);
        }

        @keyframes musicBtnPulse {
            0%, 100% {
                box-shadow: 0 0 18px rgba(50, 150, 255, 0.3), 0 4px 20px rgba(0, 0, 0, 0.4)
            }
            50% {
                box-shadow: 0 0 40px rgba(100, 180, 255, 0.65), 0 0 70px rgba(50, 150, 255, 0.2), 0 4px 20px rgba(0, 0, 0, 0.4)
            }
        }

        #musicBtn::before {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            border: 1px solid rgba(100, 180, 255, 0.18);
            animation: vinylSpin 4s linear infinite;
        }

        #musicBtn.muted::before {
            opacity: 0;
        }

        @keyframes vinylSpin {
            from {
                transform: rotate(0deg)
            }
            to {
                transform: rotate(360deg)
            }
        }

        .music-note {
            position: fixed;
            pointer-events: none;
            z-index: 99989;
            font-size: 1rem;
            animation: noteFloat 3s ease-out forwards;
        }

        @keyframes noteFloat {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1)
            }
            100% {
                opacity: 0;
                transform: translate(var(--nx), var(--ny)) scale(0.4)
            }
        }

        /* ── NAV ── */
        .back-btn {
            position: fixed;
            top: 1.5rem;
            left: 1.5rem;
            z-index: 9999;
            background: rgba(0, 20, 60, 0.6);
            border: 1px solid rgba(100, 180, 255, 0.25);
            backdrop-filter: blur(16px);
            color: var(--moonlight);
            font-family: 'Dancing Script', cursive;
            font-size: 1rem;
            padding: .55rem 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: .4rem;
            transition: all .25s;
        }

        .back-btn:hover {
            background: rgba(0, 40, 100, 0.8);
            transform: translateX(-3px);
        }

        /* ── HERO (matching index video card) ── */
        .hero {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-video-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            z-index: 1;
            background: linear-gradient(to bottom, rgba(0, 5, 20, 0.55) 0%, rgba(0, 10, 30, 0.25) 40%, rgba(0, 10, 30, 0.35) 70%, rgba(0, 5, 20, 0.75) 100%);
        }

        .hero-hud {
            position: absolute;
            inset: 0;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            pointer-events: none;
        }

        .hb-wrap {
            text-align: center;
            margin-bottom: 1.2rem;
        }

        .hb-line1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 5.5vw, 4rem);
            font-weight: 700;
            line-height: 1.1;
            display: block;
            background: linear-gradient(135deg, #e8f4ff 0%, #a8d4ff 40%, #4a9eff 70%, #7ec8ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 24px rgba(50, 150, 255, .7));
            margin-bottom: 0.2rem;
        }

        .hb-sub {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(1.4rem, 3vw, 2.2rem);
            background: linear-gradient(135deg, #fff 0%, #f4a0b0 35%, #a8d4ff 70%, #ffd97d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 2px 20px rgba(244, 160, 176, 0.7));
            display: block;
            margin-bottom: 1.2rem;
        }

        .hero-tagline {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: clamp(.9rem, 2.2vw, 1.25rem);
            color: rgba(220, 200, 220, 0.8);
            text-align: center;
            letter-spacing: .1em;
            margin-bottom: 1.8rem;
            text-shadow: 0 2px 16px rgba(0, 0, 0, 0.6);
        }

        .hero-glass-badge {
            position: absolute;
            bottom: 2.2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            background: rgba(0, 20, 60, 0.45);
            border: 1px solid rgba(244, 160, 176, 0.22);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 50px;
            padding: .75rem 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            box-shadow: 0 4px 30px rgba(244, 160, 176, 0.25), inset 0 1px 0 rgba(255, 220, 240, 0.12);
            white-space: nowrap;
            animation: badgeSlideUp 1s ease-out 1.2s both;
            pointer-events: none;
        }

        @keyframes badgeSlideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        .hero-glass-badge::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            border-radius: 50px;
            background: linear-gradient(90deg, transparent, rgba(244, 160, 176, 0.35), transparent);
        }

        .hgb-name {
            font-family: 'Dancing Script', cursive;
            font-size: 1.25rem;
            color: var(--rose);
            text-shadow: 0 0 12px rgba(244, 160, 176, 0.6);
        }

        .hgb-icons {
            font-size: 1.1rem;
            letter-spacing: .25rem;
        }

        .scroll-cue {
            position: absolute;
            bottom: 5rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: .4rem;
            animation: cuePulse 2.5s ease-in-out infinite;
            color: rgba(244, 160, 176, 0.4);
            font-size: .72rem;
            letter-spacing: .18em;
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            pointer-events: none;
        }

        .scroll-cue::after {
            content: '';
            display: block;
            width: 1px;
            height: 32px;
            background: linear-gradient(to bottom, rgba(244, 160, 176, 0.5), transparent);
        }

        @keyframes cuePulse {
            0%, 100% {
                opacity: .4;
                transform: translateX(-50%) translateY(0)
            }
            50% {
                opacity: 1;
                transform: translateX(-50%) translateY(6px)
            }
        }

        /* ── LAYOUT ── */
        .page {
            position: relative;
            z-index: 10;
        }

        .section {
            padding: 5rem 2rem;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* ── POEMS MAIN ── */
        .poems-wrap {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        /* ── POEM CARD ── */
        .poem-card {
            position: relative;
            margin: 0 auto 4rem;
            width: 100%;
            max-width: 820px;
            opacity: 0;
            transform: translateY(32px);
            transition: opacity 1s, transform 1s;
        }

        .poem-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* card inner */
        .poem-inner {
            background: rgba(0, 15, 45, 0.38);
            border: 1px solid rgba(244, 160, 176, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 2.6rem 3rem;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 50px rgba(0, 0, 0, .5), inset 0 1px 0 rgba(244, 160, 176, .06);
            transition: box-shadow .4s, transform .4s;
        }

        .poem-inner:hover {
            box-shadow: 0 16px 60px rgba(244, 160, 176, .08), 0 8px 50px rgba(0, 0, 0, .5);
            transform: translateY(-3px);
        }

        .poem-inner::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(244, 160, 176, 0.2), rgba(168, 212, 255, 0.15), transparent);
        }

        /* alternating left/right tint strip */
        .poem-card:nth-child(odd) .poem-inner {
            border-left: 2px solid rgba(244, 160, 176, 0.18);
        }

        .poem-card:nth-child(even) .poem-inner {
            border-right: 2px solid rgba(168, 212, 255, 0.18);
        }

        /* number */
        .poem-num {
            position: absolute;
            top: 1.6rem;
            right: 1.8rem;
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 4.5rem;
            line-height: 1;
            color: rgba(244, 160, 176, 0.055);
            letter-spacing: -.02em;
            user-select: none;
            pointer-events: none;
        }

        .poem-card:nth-child(even) .poem-num {
            right: auto;
            left: 1.8rem;
            color: rgba(168, 212, 255, 0.055);
        }

        /* dialogue vs verse */
        .poem-body {
            position: relative;
            z-index: 1;
        }

        .poem-verse {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.05rem, 2.2vw, 1.3rem);
            font-style: italic;
            font-weight: 300;
            line-height: 2;
            color: rgba(235, 215, 235, .88);
            white-space: pre-wrap;
            letter-spacing: .02em;
        }

        /* dialogue styling */
        .poem-dialogue {
            display: flex;
            flex-direction: column;
            gap: .9rem;
        }

        .dial-line {
            display: flex;
            flex-direction: column;
            gap: .15rem;
        }

        .dial-q {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(1rem, 2vw, 1.2rem);
            color: rgba(244, 160, 176, .85);
            padding-left: .2rem;
        }

        .dial-a {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: clamp(.95rem, 1.9vw, 1.15rem);
            color: rgba(180, 215, 255, .7);
            padding-left: 1.4rem;
            line-height: 1.7;
            border-left: 1.5px solid rgba(168, 212, 255, 0.18);
            margin-left: .3rem;
        }

        /* feather deco */
        .poem-deco {
            position: absolute;
            bottom: 1.2rem;
            right: 1.6rem;
            font-size: 1.1rem;
            opacity: .18;
            user-select: none;
            pointer-events: none;
            animation: decoFloat 5s ease-in-out infinite;
        }

        .poem-card:nth-child(even) .poem-deco {
            right: auto;
            left: 1.6rem;
        }

        @keyframes decoFloat {
            0%, 100% {
                transform: translateY(0) rotate(0deg)
            }
            50% {
                transform: translateY(-5px) rotate(6deg)
            }
        }

        /* ── FLOAT HEART ── */
        .float-heart {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            animation: floatUp 4s ease-in forwards;
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0)
            }
            100% {
                opacity: 0;
                transform: translateY(-80vh) scale(.5)
            }
        }

        /* ── SPARKLE ── */
        .sparkle {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: radial-gradient(circle, #fff 0%, rgba(244, 160, 176, .5) 60%, transparent 100%);
            animation: sparkleOut .8s ease-out forwards;
        }

        @keyframes sparkleOut {
            0% {
                opacity: 1;
                transform: scale(1) translate(0, 0)
            }
            100% {
                opacity: 0;
                transform: scale(0) translate(var(--sx), var(--sy))
            }
        }

        /* ── FOOTER ── */
        footer {
            text-align: center;
            padding: 4rem 2rem;
            font-family: 'Dancing Script', cursive;
            font-size: 1.15rem;
            color: rgba(244, 160, 176, .3);
            z-index: 10;
            position: relative;
        }

        /* ── SCROLLBAR ── */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(244, 160, 176, .2);
            border-radius: 2px;
        }

        @media(max-width:600px) {
            .poem-inner {
                padding: 1.8rem 1.4rem;
            }
            .poem-num {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>

    <div class="mist"></div>
    <div class="aurora">
        <div class="aurora-band"></div>
        <div class="aurora-band"></div>
        <div class="aurora-band"></div>
    </div>
    <div class="moonray" style="--a:-18deg;left:25%;"></div>
    <div class="moonray" style="--a:0deg;left:50%;"></div>
    <div class="moonray" style="--a:18deg;left:75%;"></div>
    <canvas id="starCanvas"></canvas>

    <!-- MUSIC PLAYER (identical to index) -->
    <audio id="bgMusic" loop>
        <source src="song.mp3" type="audio/mpeg">
    </audio>
    <button id="musicBtn" title="Toggle music" onclick="toggleMusic()">🎵</button>

    <a href="index.html" class="back-btn">← Home</a>

    <!-- HERO VIDEO CARD (matched to index style) -->
    <section class="hero">
        <video class="hero-video-bg" autoplay loop muted playsinline>
            <source src="kavi.mp4" type="video/mp4">
        </video>
        <div class="hero-overlay"></div>
        <div class="hero-hud">
            <div class="hb-wrap">
                <span class="hb-line1">Kavithaigal</span>
                <span class="hb-sub">கவிதைகள்</span>
            </div>
            <p class="hero-tagline">Words the heart wrote before the mind could stop it — every line, for you 💙</p>
        </div>
        <div class="hero-glass-badge">
            <span class="hgb-name">Un Ninaivil 🪶</span>
            <span class="hgb-icons">💙 🌙 ✨</span>
        </div>
        <div class="scroll-cue">padiyungal</div>
    </section>

    <!-- POEMS -->
    <div class="page">
        <div class="section">
            <div class="container">
                <div class="poems-wrap" id="poemsWrap"></div>
            </div>
        </div>
    </div>

    <footer>Un ninaivil ezhudhiya kavithaigal — forever yours 🪶 💙</footer>

    <script>
        /* ══════════════════════════ POEM DATA ══════════════════════════ */
        const POEMS = [{
            type: 'verse',
            text: `Ennai urarthi paka vaikum unnidam vilvathu thana sari,
apade than nanum unnidam vilnthan —
yan kathalana 🥰💝`
        }, {
            type: 'verse',
            text: `Nan unai manathara varukiran.`
        }, {
            type: 'verse',
            text: `Un kankalil tholainthu poi
onrarai varudam agi vitathu —
analum ennum mendu vera vali thariya villai.`
        }, {
            type: 'verse',
            text: `En avalea ennai alagai kaatum —
en alagea.`
        }, {
            type: 'verse',
            text: `Nee vili muudu naan un madiel saaikiran
iruvarum kanavil kaanbom
nam ulagathai
Viraivil ninaivaakuvom.`
        }, {
            type: 'verse',
            text: `Nee en kaiel irrunthu enai paartha tharunam
en kannukul therndhathu —
iivulagathil irrukum mulu alagai
oru ganam kandan.`
        }, {
            type: 'verse',
            text: `En uri prium tharunam un mugam keakum.
Nee ennai prium tharunam en ganam maraiummm.

Enku oru varam keadaikumaa?`
        }, {
            type: 'verse',
            text: `En kannum unnai theaduthu
meendum meendum —
un manam ennai uranga vidamal

        }, {
            type: 'verse',
            text: `Mathi mayaingi ponan en madhaviyai kandu —
Vinnum mannum niyabagam varavillai.`
        }, {
            type: 'verse',
            text: `En kannana kanmani —
in kannil kanneer vanthal
indha kadalum karaiummm.`
        }, {
            type: 'verse',
            text: `Irrunda vaanathil venmeagathil
en vennilavin siripai paathu —
kadalil muthukal than alagai thucham maakum.`
        }, {
            type: 'verse',
            text: `Ennai kollum enthan rachasiyeaaaaaaa.`
        }, {
            type: 'dialogue',
            lines: [
                { q: 'Ennavalea en ueri einga?', a: 'Un ueri na pathukapaka ennul vaithu erukan.' },
                { q: 'Un ueir einga endru theriuma?', a: 'Yan ueri ne pathukapaka vaithu erukai allava.' },
                { q: 'Enavalea en Kannil unnai kaanamal ueir illamal poivittadhu.', a: 'Kathu erungal — kathu erupathi than vali odu oru sugam erukum.' },
                { q: 'Sugamaanadhu sila nearangalil naragamaaga maarugiradhu.', a: 'Atharkenru sugathai kanamai eruka mudiuma?' },
                { q: 'Un suvaiyai en ethalgal 💋 keakiradhu — adhuvea orea marunthu.', a: 'En ethalgalum than katkirathu.' },
                { q: 'Enna seivadhu?', a: 'Nengal than solla vandum yapothu kidaikum yanru.' },
                { q: 'Vaanea erul aagi irrukiradhuuu.', a: 'Valiya sanru paru — erulil oru thavatai tharium. Athu than un kathalai vanra kathali.' },
                { q: 'Avaavre aagatum en thalaiviea.', a: 'Nalam undakathum magana.' },
                { q: 'Eingea en kadhali?', a: 'Un kathali avalathu kathalan udan urayadikondu erukiral.' },
                { q: 'Un kadhalanai pathi siru varrthai sol.', a: 'Avanai ennavanru solluvan — engirunthu arampipathu? Enna kovamaka erunthalum nodiil karaikum — avan kankalai patri solla va ella endral, avan pachum alagi kandu mayanki ponatha.' }
            ]
        }, {
            type: 'dialogue',
            lines: [
                { q: 'Pathi solla va, ella yanran — enna anu anu vaka rasitha avan kai viralkalai patri solla va.', a: 'Avan patri solla vaithaikal pothathu.' },
                { q: 'Adada — oru kavidhayea, kavi paadum alagai indru naan kandu viyandhan.', a: null },
                { q: 'Thaan kavi endru ariyamal thaan sollum ovovru solum kavithayaga maarum alagai — maru paguthil irrukum oru kavinganaal tha rasika mudium.', a: 'Apade enran — nengal en kavinganaaga eruka mudiuma??' },
                { q: 'Sandheagamaa?', a: 'En sathiyatha yavaru na sandhakam kolvathu — avanai na santhakam eetal ennai nana santhakam paduvathai pol erukum.' },
                { q: 'Ennavail oru kavidhai than.', a: 'Yapothum yan kavinkanku oru eniya kavithaiyaka erupan.' }
            ]
        }, {
            type: 'verse',
            text: `Entha maayamum illamal
Entha mathiramum illamal
Ennai vasiyam seidha —
Un iru vizhigal.`
        }, {
            type: 'verse',
            text: `Un vaasam pidika en suvasam eainguthadi.`
        }, {
            type: 'verse',
            text: `Karam pidika varam ondru keadaikumaa?`
        }, {
            type: 'verse',
            text: `Keadaithalum ennavalin manam adhai yearkuma?
Yearthal — ivulagathium naa jaipan ennavilkaha.`
        }, {
            type: 'verse',
            text: `Unn kaathirupai yanthum
nenjathi naa kaayam kolla maatan.`
        }, {
            type: 'verse',
            text: `Sammadham therivithal
naan un madi saaivan.`
        }, {
            type: 'verse',
            text: `Kaalam mattum kai kuudatum —
unn kal tharail padamal
naa vaithukolkiran.`
        }, {
            type: 'verse',
            text: `Un marbil naan saanthu kidaka manipoluthu pathathu.`
        }, {
            type: 'verse',
            text: `Minnal idai udaiyavil udadhu —
iru karangalukidaiyea ennai anaipayaa?`
        }, {
            type: 'verse',
            text: `Kaalam kadanthalum yugangal kadanthalum
naan un kaaladil panivudai seium
oru adimaithan — maravathea.`
        }, {
            type: 'verse',
            text: `Oru ganam en ninaivil neeum naanum
seara amarnthu udal aanathu anaiya —
naan un maarbil mainga manamaanadhu eaingukirathu.`
        }];

        const DECOS = ['🪶', '💙', '🌙', '✨', '🌸', '💫', '⭐', '🌺', '💝'];

        /* ══════════════════════════ BUILD POEMS ══════════════════════════ */
        (function buildPoems() {
            const wrap = document.getElementById('poemsWrap');
            POEMS.forEach((p, i) => {
                const card = document.createElement('div');
                card.className = 'poem-card';

                let inner = '';
                if (p.type === 'verse') {
                    inner = `<p class="poem-verse">${escHtml(p.text)}</p>`;
                } else {
                    let dlHtml = '<div class="poem-dialogue">';
                    p.lines.forEach(l => {
                        dlHtml += `<div class="dial-line">
                            <span class="dial-q">✦ ${escHtml(l.q)}</span>
                            ${l.a ? `<span class="dial-a">${escHtml(l.a)}</span>` : ''}
                        </div>`;
                    });
                    dlHtml += '</div>';
                    inner = dlHtml;
                }

                const deco = DECOS[i % DECOS.length];
                card.innerHTML = `
                    <div class="poem-inner">
                        <div class="poem-num">${String(i+1).padStart(2,'0')}</div>
                        <div class="poem-body">${inner}</div>
                        <span class="poem-deco">${deco}</span>
                    </div>`;
                wrap.appendChild(card);
            });
        })();

        function escHtml(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

        /* ══════════════════════════ SCROLL REVEAL ══════════════════════════ */
        const obs = new IntersectionObserver(entries => {
            entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
        }, { threshold: 0.06 });
        document.querySelectorAll('.poem-card').forEach(el => obs.observe(el));

        /* ══════════════════════════ STARS ══════════════════════════ */
        (function() {
            const c = document.getElementById('starCanvas'),
                ctx = c.getContext('2d');
            let W, H, stars = [],
                shooters = [];

            function resize() { W = c.width = window.innerWidth;
                H = c.height = window.innerHeight; }
            resize();
            window.addEventListener('resize', resize);
            for (let i = 0; i < 220; i++) stars.push({ x: Math.random() * W, y: Math.random() * H, r: Math.random() * 1.8 + .2,
                a: Math.random(), da: Math.random() * .007 + .002, col: Math.random() < .5 ? '180,220,255' :
                '255,255,255' });
            setInterval(() => { if (Math.random() < .4) shooters.push({ x: Math.random() * W, y: 0, vx: -(Math.random() *
                        6 + 3), vy: Math.random() * 4 + 3, len: Math.random() * 150 + 80, a: 1, col: Math.random() <
                    .4 ? '100,180,255' : '255,200,200' }); }, 600);
            (function draw() {
                ctx.clearRect(0, 0, W, H);
                stars.forEach(s => { s.a += s.da; if (s.a > 1 || s.a < 0) s.da *= -1;
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${s.col},${s.a*.85})`;
                    ctx.fill(); });
                shooters.forEach((s, i) => { s.x += s.vx;
                    s.y += s.vy;
                    s.a -= .009; if (s.a <= 0 || s.y > H) { shooters.splice(i, 1); return; }
                    ctx.beginPath();
                    ctx.moveTo(s.x, s.y);
                    ctx.lineTo(s.x - s.vx * (s.len / 8), s.y - s.vy * (s.len / 8));
                    const g = ctx.createLinearGradient(s.x, s.y, s.x - s.vx * (s.len / 8), s.y - s.vy * (s.len /
                        8));
                    g.addColorStop(0, `rgba(${s.col},${s.a})`);
                    g.addColorStop(1, 'transparent');
                    ctx.strokeStyle = g;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, 2.5, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255,255,255,${s.a})`;
                    ctx.fill(); });
                requestAnimationFrame(draw);
            })();
        })();

        /* ══════════════════════════ MUSIC ══════════════════════════ */
        const bgMusic = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('musicBtn');
        let musicPlaying = false,
            musicStarted = false,
            noteInterval = null;

        function startMusic() {
            bgMusic.volume = 0.45;
            bgMusic.play().then(() => {
                musicPlaying = true;
                musicStarted = true;
                musicBtn.textContent = '🎵';
                musicBtn.classList.remove('muted');
                startNotes();
                document.removeEventListener('click', tryAuto);
                document.removeEventListener('touchstart', tryAuto);
            }).catch(() => { musicBtn.textContent = '🔇';
                musicBtn.classList.add('muted'); });
        }

        function toggleMusic() {
            if (!musicStarted) { startMusic(); return; }
            if (musicPlaying) {
                bgMusic.pause();
                musicPlaying = false;
                musicBtn.textContent = '🔇';
                musicBtn.classList.add('muted');
                if (noteInterval) { clearInterval(noteInterval);
                    noteInterval = null; }
            } else {
                bgMusic.play();
                musicPlaying = true;
                musicBtn.textContent = '🎵';
                musicBtn.classList.remove('muted');
                startNotes();
            }
        }

        function startNotes() {
            if (noteInterval) clearInterval(noteInterval);
            noteInterval = setInterval(() => {
                if (!musicPlaying) return;
                const note = document.createElement('div');
                note.className = 'music-note';
                const notes = ['♪', '♫', '♬', '🎵', '🎶'];
                note.textContent = notes[Math.floor(Math.random() * notes.length)];
                const rect = musicBtn.getBoundingClientRect();
                note.style.left = (rect.left + rect.width / 2) + 'px';
                note.style.top = (rect.top + rect.height / 2) + 'px';
                note.style.position = 'fixed';
                note.style.color = Math.random() < .5 ? 'rgba(168,212,255,0.9)' : 'rgba(244,160,176,0.9)';
                note.style.textShadow = '0 0 10px rgba(244,160,176,0.7)';
                note.style.pointerEvents = 'none';
                const nx = (Math.random() * 100 - 80) + 'px',
                    ny = -(Math.random() * 80 + 40) + 'px';
                note.style.setProperty('--nx', nx);
                note.style.setProperty('--ny', ny);
                document.body.appendChild(note);
                setTimeout(() => note.remove(), 3000);
            }, 800);
        }

        function tryAuto() { if (!musicStarted) startMusic(); }
        document.addEventListener('click', tryAuto);
        document.addEventListener('touchstart', tryAuto);

        /* ══════════════════════════ CLICK EFFECTS ══════════════════════════ */
        document.addEventListener('click', e => {
            if (e.target.closest('.back-btn') || e.target.closest('#musicBtn')) return;
            const emojis = ['🪶', '💙', '🌙', '💖', '✨', '🌸', '💝'];
            for (let i = 0; i < 5; i++) {
                const h = document.createElement('div');
                h.className = 'float-heart';
                h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                h.style.cssText =
                    `left:${e.clientX+Math.random()*40-20}px;top:${e.clientY+window.scrollY}px;position:absolute;font-size:${Math.random()*.9+.7}rem;pointer-events:none;z-index:9999;`;
                document.body.appendChild(h);
                setTimeout(() => h.remove(), 4000);
            }
            for (let i = 0; i < 7; i++) {
                const sp = document.createElement('div');
                sp.className = 'sparkle';
                const angle = Math.random() * Math.PI * 2,
                    dist = Math.random() * 55 + 15;
                sp.style.cssText = `left:${e.clientX}px;top:${e.clientY+window.scrollY}px;position:absolute;`;
                sp.style.setProperty('--sx', Math.cos(angle) * dist + 'px');
                sp.style.setProperty('--sy', Math.sin(angle) * dist + 'px');
                document.body.appendChild(sp);
                setTimeout(() => sp.remove(), 900);
            }
        });
    </script>
</body>
</html>
